baseURL = 'https://the-king-of-comedy.github.io/'
languageCode = 'zh-cn'
title = 'the king of comedy'
theme = 'PaperMod'

[params]
    defaultTheme = "auto"
    showCodeCopyButtons = true
    displayFullContent = false
    # 开启搜索和标签功能
    ShowReadingTime = true
    ShowTagCloud = true
    # 强制让 Hugo 在生成 URL 时尝试保持原样（部分主题支持）
    removePathAccents = false
    DateFormat = "2006-01-02 15:04:05"

[outputs]
    home = ["HTML", "RSS", "JSON"] # 搜索功能需要 JSON 输出